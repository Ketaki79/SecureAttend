<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-[#0f172a] via-[#020617] to-black text-white min-h-screen flex">

<!-- Sidebar -->
<aside class="w-64 bg-slate-900 p-6 flex flex-col h-screen fixed left-0 top-0 overflow-hidden">
  <h2 class="text-2xl font-bold text-blue-400 mb-10 cursor-pointer">SecureAttend</h2>
  <nav class="flex flex-col gap-5 text-lg">
    <button onclick="showSection('dashboard', this)" class="menu-btn flex items-center gap-3">
      <i class="fas fa-home"></i> Dashboard
    </button>
    <button onclick="showSection('students', this)" class="menu-btn flex items-center gap-3">
      <i class="fas fa-user-graduate"></i> Students
    </button>
    <button onclick="showSection('faculty', this)" class="menu-btn flex items-center gap-3">
      <i class="fas fa-chalkboard-teacher"></i> Faculty
    </button>
    <button onclick="showSection('subjects', this)" class="menu-btn flex items-center gap-3">
      <i class="fas fa-book"></i> Subjects
    </button>
  </nav>
  <a href="index.html" class="flex items-center gap-3 text-red-400 mt-auto hover:text-red-500">
    <i class="fas fa-sign-out-alt"></i> Logout
  </a>
</aside>

<!-- Main -->
<main class="flex-1 p-8 ml-64 space-y-8">

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <!-- Top Bar -->
  <div class="flex justify-between items-center">
    <h1 class="text-3xl font-bold">Admin Dashboard</h1>

    <div class="flex items-center gap-4">

      <button onclick="connectWallet()" 
        class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700">
        Connect Wallet
      </button>

      <div class="bg-blue-500 w-10 h-10 rounded-full flex items-center justify-center font-bold">
        A
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid md:grid-cols-3 gap-6 mt-6">
    <div class="bg-white/10 p-6 rounded-xl text-center">
      <h3>Total Students</h3>
      <p class="text-3xl text-blue-400" id="studentCount">0</p>
    </div>

    <div class="bg-white/10 p-6 rounded-xl text-center">
      <h3>Total Faculty</h3>
      <p class="text-3xl text-green-400" id="facultyCount">0</p>
    </div>

    <div class="bg-white/10 p-6 rounded-xl text-center">
      <h3>Total Subjects</h3>
      <p class="text-3xl text-yellow-400" id="subjectCount">0</p>
    </div>
  </div>

  <!-- Forms -->
  <div class="grid md:grid-cols-2 gap-6 mt-6">

    <!-- Add Student -->
    <div class="bg-white/10 p-6 rounded-xl">
      <h3 class="text-xl mb-4 text-blue-400">Add Student</h3>

      <input id="sName" placeholder="Full Name" class="input">
      <input id="sEmail" placeholder="Email" class="input">
      <input id="sBranch" placeholder="Branch" class="input">
      <input id="sSem" placeholder="Semester" class="input">

      <button onclick="addStudent()" class="btn-blue">Add Student</button>
    </div>

    <!-- Add Faculty -->
    <div class="bg-white/10 p-6 rounded-xl">
      <h3 class="text-xl mb-4 text-green-400">Add Faculty</h3>

      <input id="fName" placeholder="Full Name" class="input">
      <input id="fEmail" placeholder="Email" class="input">
      <input id="fBranch" placeholder="Branch" class="input">
      <input id="fSubject" placeholder="Subject" class="input">

      <button onclick="addFaculty()" class="btn-green">Add Faculty</button>
    </div>

  </div>

</div>

<!-- ================= STUDENTS ================= -->
<div id="students" class="hidden">
  <h2 class="text-2xl mb-4">Students</h2>

  <table class="w-full bg-white/10 rounded-xl">
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>Branch</th><th>Sem</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<!-- ================= FACULTY ================= -->
<div id="faculty" class="hidden">
  <h2 class="text-2xl mb-4">Faculty</h2>

  <table class="w-full bg-white/10 rounded-xl">
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>Branch</th><th>Subject</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="facultyTable"></tbody>
  </table>
</div>

<!-- ================= SUBJECTS ================= -->
<div id="subjects" class="hidden">
  <h2 class="text-2xl mb-4">Subjects</h2>

  <table class="w-full bg-white/10 rounded-xl">
    <thead>
      <tr><th>Semester</th><th>Subject</th></tr>
    </thead>
    <tbody id="subjectTable"></tbody>
  </table>
</div>

</main>

<style>
.input {
  width:100%;
  padding:8px;
  margin-bottom:10px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;
}
.btn-blue {background:#2563eb; padding:10px; width:100%; border-radius:8px;}
.btn-green {background:#16a34a; padding:10px; width:100%; border-radius:8px;}
</style>

<script src="js/admin.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/blockchain.js"></script>

</body>
</html>
