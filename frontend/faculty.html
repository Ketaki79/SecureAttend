<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-gradient-to-br from-[#020617] via-[#0f172a] to-black text-white min-h-screen flex font-sans">

<!-- ================= SIDEBAR ================= -->
<aside class="w-64 bg-slate-900 p-6 flex flex-col shadow-xl h-screen fixed left-0 top-0">

  <!-- Logo -->
  <h2 class="text-2xl font-bold text-blue-400 mb-10">Faculty Panel</h2>

  <!-- Menu -->
  <nav class="flex flex-col gap-3 flex-1">

    <button onclick="showSection('attendance', this)" 
      class="menu-item flex items-center gap-3 p-3 rounded-lg hover:bg-white/10">
      <i class="fas fa-user-check"></i> Attendance
    </button>

    <button onclick="showSection('reports', this)" 
      class="menu-item flex items-center gap-3 p-3 rounded-lg hover:bg-white/10">
      <i class="fas fa-chart-bar"></i> Reports
    </button>

  </nav>

  <!-- Logout (BOTTOM FIXED) -->
  <div>
    <a href="index.html" class="flex items-center gap-3 text-red-400 mt-auto hover:text-red-500">
      <i class="fas fa-sign-out-alt"></i> Logout
    </a>
  </div>

</aside>

<!-- ================= MAIN ================= -->
<main class="flex-1 p-10 ml-64 space-y-10">

<!-- ================= ATTENDANCE ================= -->
<div id="attendance" class="section">

  <h1 class="text-3xl font-bold mb-6">Mark Attendance</h1>

  <!-- Subject Dropdown -->
  <div class="mb-6">
    <select id="subject" 
      class="w-64 px-3 py-2 text-sm rounded-lg bg-white/10 border border-white/20 text-white
             focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200">
      <option value="" disabled selected>Select Subject</option>
      <option value="Blockchain" class="text-black">Blockchain</option>
      <option value="DBMS" class="text-black">DBMS</option>
    </select>
  </div>

  <!-- Table Card -->
  <div class="bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 shadow-xl">

    <div class="max-h-[400px] overflow-y-auto">
      <table class="w-full text-left">

        <thead class="bg-white/10 sticky top-0">
          <tr>
            <th class="p-4">Student</th>
            <th class="p-4">Status</th>
          </tr>
        </thead>

        <tbody id="table"></tbody>

      </table>
    </div>

  </div>

  <!-- Submit -->
  <button id="submitBtn"
    onclick="submitAttendance()"
    class="mt-6 px-8 py-3 rounded-xl font-semibold
    bg-gradient-to-r from-blue-500 to-purple-600
    hover:scale-105 hover:shadow-2xl transition duration-300">
    Submit Attendance
  </button>

</div>

<!-- ================= REPORTS ================= -->
<div id="reports" class="section hidden">

  <h1 class="text-3xl font-bold mb-6">Reports</h1>

  <!-- Report Subject Dropdown -->
  <div class="mb-6">
    <select id="reportSubject" onchange="loadReport()"
      class="w-64 px-3 py-2 text-sm rounded-lg bg-white/10 border border-white/20 text-white
             focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200">
      <option value="Blockchain" class="text-black">Blockchain</option>
      <option value="DBMS" class="text-black">DBMS</option>
    </select>
  </div>

  <div class="text-xl mb-4">
    Attendance: <span id="percentage" class="text-blue-400">0%</span>
  </div>

  <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
    <canvas id="chart"></canvas>
  </div>

</div>

</main>

<script>

// ================= ACTIVE MENU =================
function showSection(id, el) {
  document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");

  document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("bg-blue-600"));
  if(el) el.classList.add("bg-blue-600");
}

// ================= STUDENTS =================
const students = [
  "Rahul Sharma",
  "Priya Patel",
  "Amit Verma",
  "Sneha Iyer"
];

let attendanceData = {};

// ================= LOAD TABLE =================
function loadTable() {
  const subject = document.getElementById("subject").value;
  if (!attendanceData[subject]) attendanceData[subject] = {};

  const table = document.getElementById("table");
  table.innerHTML = "";

  students.forEach(name => {
    const status = attendanceData[subject][name] || "";

    table.innerHTML += `
      <tr class="border-b border-white/10 hover:bg-white/10">
        <td class="p-4">${name}</td>
        <td class="p-4 flex gap-3">

          <button onclick="mark('${name}','present')" 
            class="px-4 py-1 rounded-full text-sm
            ${status==='present' ? 'bg-green-500 scale-105' : 'bg-white/10 hover:bg-green-500'}">
            Present
          </button>

          <button onclick="mark('${name}','absent')" 
            class="px-4 py-1 rounded-full text-sm
            ${status==='absent' ? 'bg-red-500 scale-105' : 'bg-white/10 hover:bg-red-500'}">
            Absent
          </button>

        </td>
      </tr>
    `;
  });
}

// ================= MARK =================
function mark(name, status) {
  const subject = document.getElementById("subject").value;
  attendanceData[subject][name] = status;
  loadTable();
}

loadTable();
document.getElementById("subject").addEventListener("change", loadTable);

// ================= SUBMIT =================
function submitAttendance() {
  const btn = document.getElementById("submitBtn");

  btn.innerText = "Saving...";
  btn.classList.add("opacity-70");

  setTimeout(() => {
    btn.innerText = "✅ Saved";
    btn.classList.add("bg-green-600");

    setTimeout(() => {
      btn.innerText = "Submit Attendance";
      btn.classList.remove("bg-green-600");
    }, 2000);

  }, 1000);
}

// ================= REPORT =================
let chart;

function loadReport() {
  const subject = document.getElementById("reportSubject").value;
  const data = attendanceData[subject] || {};

  const names = Object.keys(data);
  const values = names.map(n => data[n] === "present" ? 1 : 0);

  let present = values.reduce((a,b)=>a+b,0);
  let percentage = names.length ? ((present/names.length)*100).toFixed(1) : 0;

  document.getElementById("percentage").innerText = percentage + "%";

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{ 
        label: 'Attendance',
        data: values,
        backgroundColor: values.map(v => v ? '#22c55e' : '#ef4444')
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true,
          max: 1,
          ticks: {
            stepSize: 1
          }
        }
      }
    }
  });
}

</script>

</body>
</html>
