<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#020617] via-[#0f172a] to-black text-white min-h-screen flex font-sans">

<!-- ================= SIDEBAR ================= -->
<aside class="w-64 bg-slate-900 p-6 flex flex-col shadow-xl h-screen fixed left-0 top-0">
  <h2 class="text-2xl font-bold text-blue-400 mb-10">SecureAttend</h2>

  <nav class="flex flex-col gap-3 flex-1">
    <button onclick="showSection('attendance', this)" class="menu-btn flex items-center gap-3 p-3 rounded-lg hover:bg-white/10">
      Attendance
    </button>
    <button onclick="showSection('reports', this)" class="menu-btn flex items-center gap-3 p-3 rounded-lg hover:bg-white/10">
      Reports
    </button>
  </nav>

  <a href="index.html" class="flex items-center gap-3 text-red-400 mt-auto hover:text-red-500">
    Logout
  </a>
</aside>

<!-- ================= MAIN ================= -->
<main class="flex-1 p-10 ml-64 space-y-10">

<!-- ================= ATTENDANCE ================= -->
<div id="attendance" class="section">
  <h1 class="text-3xl font-bold mb-6">Mark Attendance</h1>

  <div class="mb-6">
    <select id="subject" class="w-64 px-3 py-2 text-sm rounded-lg bg-white/10 border border-white/20 text-white"></select>
  </div>

  <div class="bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 shadow-xl">
    <div class="max-h-[400px] overflow-y-auto">
      <table class="w-full text-left">
        <thead class="bg-white/10 sticky top-0">
          <tr><th class="p-4">Student</th><th class="p-4">Status</th></tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

  <button id="submitBtn" onclick="submitAttendance()" class="mt-6 px-8 py-3 rounded-xl font-semibold bg-gradient-to-r from-blue-500 to-purple-600 hover:scale-105">
    Submit Attendance
  </button>
</div>

<!-- ================= REPORTS ================= -->
<div id="reports" class="section hidden">
  <h1 class="text-3xl font-bold mb-6">Reports</h1>
  <div class="mb-6">
    <select id="reportSubject" onchange="loadReport()" class="w-64 px-3 py-2 text-sm rounded-lg bg-white/10 border border-white/20 text-white"></select>
  </div>
  <div class="text-xl mb-4">
    Attendance: <span id="percentage" class="text-blue-400">0%</span>
  </div>
  <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
    <canvas id="chart"></canvas>
  </div>
</div>

</main>

<script src="js/faculty.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/blockchain.js"></script>
</body>
</html>
